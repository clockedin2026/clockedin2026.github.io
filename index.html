<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Clocked In 2026 · 官方链接 | 幽灵漫步 & 悬挂小丑</title>

<!-- Google Fonts + Font Awesome 6 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  /* ======================
     全局与原始样式 (保留完整核心设计)
  ====================== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    background: #ececef;
    padding: 30px 15px;
    /* 底部留出足够空间让幽灵行走不遮挡主要内容 */
    padding-bottom: 140px;
    position: relative;
    min-height: 100vh;
  }

  .container {
    max-width: 700px;
    margin: auto;
  }

  /* ======================
     PROFILE (Logo在上方正中)
  ====================== */
  .profile {
    text-align: center;
    margin-top: 20px;
    margin-bottom: 35px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .profile img {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
    background: white;
    margin-bottom: 12px;
  }

  /* 闪耀文字效果 */
  .btn-shine {
    display: inline-block;
    margin-top: 0;
    background: linear-gradient(
      to right,
      #888 0%,
      #ffffff 20%,
      #070505 40%
    );
    background-size: 300px auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    font-size: 58px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  @keyframes shine {
    0% { background-position: -300px; }
    100% { background-position: 300px; }
  }

  .bio {
    margin-top: 10px;
    font-size: 22px;
    font-weight: 500;
    color: #444;
  }

  /* ======================
     顶部社交图标
  ====================== */
  .social-icons {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 30px;
    margin-bottom: 40px;
  }

  .social-icons a {
    font-size: 48px;
    color: black;
    transition: .3s;
  }

  .social-icons a:hover {
    transform: scale(1.15);
  }

  /* ======================
     链接卡片区域
  ====================== */
  .links {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 15px 18px;
    display: flex;
    align-items: center;
    text-decoration: none;
    color: black;
    min-height: 110px;
    transition: .25s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
  }

  .card img {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    object-fit: cover;
  }

  .card-title {
    flex: 1;
    text-align: center;
    font-size: 24px;
    font-weight: 600;
  }

  .more {
    font-size: 24px;
    color: #888;
  }

  /* 卡片右侧组合 */
  .card-right-group {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  /* ======================
     自定义按钮样式 (文字已改为“点击”)
  ====================== */
  button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 10px;
    color: white;
    text-shadow: 2px 2px rgb(116, 116, 116);
    text-transform: uppercase;
    cursor: pointer;
    border: solid 2px black;
    letter-spacing: 1px;
    font-weight: 600;
    font-size: 17px;
    background-color: hsl(49deg 98% 60%);
    border-radius: 50px;
    position: relative;
    overflow: hidden;
    transition: all 0.5s ease;
  }

  button:active {
    transform: scale(0.9);
    transition: all 100ms ease;
  }

  button svg {
    transition: all 0.5s ease;
    z-index: 2;
  }

  .play {
    transition: all 0.5s ease;
    transition-delay: 300ms;
  }

  button:hover svg {
    transform: scale(3) translate(50%);
  }

  .now {
    position: absolute;
    left: 0;
    transform: translateX(-100%);
    transition: all 0.5s ease;
    z-index: 2;
  }

  button:hover .now {
    transform: translateX(10px);
    transition-delay: 300ms;
  }

  button:hover .play {
    transform: translateX(200%);
    transition-delay: 300ms;
  }

  .card .custom-cta-btn {
    padding: 0 12px;
    font-size: 14px;
    min-width: 100px;
    height: 44px;
    background-color: hsl(49deg 98% 60%);
    border-radius: 50px;
  }

  .card .custom-cta-btn svg {
    width: 26px;
    height: 26px;
  }

  /* ======================
     页脚
  ====================== */
  .footer {
    text-align: center;
    margin-top: 40px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #777;
  }

  /* ======================
     移动端适配
  ====================== */
  @media (max-width: 768px) {
    body {
      padding-bottom: 120px;
    }
    .profile img {
      width: 140px;
      height: 140px;
    }
    .btn-shine {
      font-size: 38px;
    }
    .bio {
      font-size: 18px;
    }
    .social-icons a {
      font-size: 38px;
    }
    .card {
      min-height: 95px;
    }
    .card img {
      width: 60px;
      height: 60px;
    }
    .card-title {
      font-size: 20px;
    }
    .card .custom-cta-btn {
      min-width: 88px;
      font-size: 12px;
      padding: 0 6px;
      height: 40px;
    }
    .card .custom-cta-btn svg {
      width: 22px;
      height: 22px;
    }
    .card-right-group {
      gap: 8px;
    }
  }

  /* ================================================
     幽灵行走动画 (从左到右，循环，位于页面底部)
     完全保留来自Uiverse的原始幽灵样式，只修改行走方向
  ================================================ */
  .ghost-walk-container {
    position: fixed;
    bottom: 20px;
    left: 0;
    width: 100%;
    pointer-events: none;    /* 让幽灵不干扰点击按钮/链接 */
    z-index: 99;
    overflow: visible;
  }

  .ghost-wrapper {
    display: inline-block;
    animation: walkFromLeftToRight 12s linear infinite;
    /* 初始偏移让幽灵从左侧外部开始 */
    transform: translateX(-280px);
    will-change: transform;
  }

  /* 行走关键帧: 从左边 -280px 走到右边 100vw */
  @keyframes walkFromLeftToRight {
    0% {
      transform: translateX(-280px);
    }
    100% {
      transform: translateX(100vw);
    }
  }

  /* 以下为来自Uiverse的幽灵原始样式（完全保留，未改动任何视觉） */
  #ghost {
    position: relative;
    scale: 0.65;          /* 略微缩小以适应底部，不显突兀 */
    display: inline-block;
    vertical-align: bottom;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
  }

  #red {
    animation: upNDown infinite 0.5s;
    position: relative;
    width: 140px;
    height: 140px;
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    grid-template-rows: repeat(14, 1fr);
    grid-column-gap: 0px;
    grid-row-gap: 0px;
    grid-template-areas:
      "a1  a2  a3  a4  a5  top0  top0  top0  top0  a10 a11 a12 a13 a14"
      "b1  b2  b3  top1 top1 top1 top1 top1 top1 top1 top1 b12 b13 b14"
      "c1 c2 top2 top2 top2 top2 top2 top2 top2 top2 top2 top2 c13 c14"
      "d1 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 d14"
      "e1 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 e14"
      "f1 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 f14"
      "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
      "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
      "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
      "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
      "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
      "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
      "st0 st0 an4 st1 an7 st2 an10 an10 st3 an13 st4 an16 st5 st5"
      "an1 an2 an3 an5 an6 an8 an9 an9 an11 an12 an14 an15 an17 an18";
  }

  @keyframes upNDown {
    0%, 49% { transform: translateY(0px); }
    50%, 100% { transform: translateY(-10px); }
  }

  #top0, #top1, #top2, #top3, #top4,
  #st0, #st1, #st2, #st3, #st4, #st5 {
    background-color: red;
  }

  #top0 { grid-area: top0; }
  #top1 { grid-area: top1; }
  #top2 { grid-area: top2; }
  #top3 { grid-area: top3; }
  #top4 { grid-area: top4; }
  #st0 { grid-area: st0; }
  #st1 { grid-area: st1; }
  #st2 { grid-area: st2; }
  #st3 { grid-area: st3; }
  #st4 { grid-area: st4; }
  #st5 { grid-area: st5; }

  #an1 { grid-area: an1; animation: flicker0 infinite 0.5s; }
  #an18 { grid-area: an18; animation: flicker0 infinite 0.5s; }
  #an2 { grid-area: an2; animation: flicker1 infinite 0.5s; }
  #an17 { grid-area: an17; animation: flicker1 infinite 0.5s; }
  #an3 { grid-area: an3; animation: flicker1 infinite 0.5s; }
  #an16 { grid-area: an16; animation: flicker1 infinite 0.5s; }
  #an4 { grid-area: an4; animation: flicker1 infinite 0.5s; }
  #an15 { grid-area: an15; animation: flicker1 infinite 0.5s; }
  #an6 { grid-area: an6; animation: flicker0 infinite 0.5s; }
  #an12 { grid-area: an12; animation: flicker0 infinite 0.5s; }
  #an7 { grid-area: an7; animation: flicker0 infinite 0.5s; }
  #an13 { grid-area: an13; animation: flicker0 infinite 0.5s; }
  #an9 { grid-area: an9; animation: flicker1 infinite 0.5s; }
  #an10 { grid-area: an10; animation: flicker1 infinite 0.5s; }
  #an8 { grid-area: an8; animation: flicker0 infinite 0.5s; }
  #an11 { grid-area: an11; animation: flicker0 infinite 0.5s; }

  @keyframes flicker0 {
    0%, 49% { background-color: red; }
    50%, 100% { background-color: transparent; }
  }

  @keyframes flicker1 {
    0%, 49% { background-color: transparent; }
    50%, 100% { background-color: red; }
  }

  #eye {
    width: 40px;
    height: 50px;
    position: absolute;
    top: 30px;
    left: 10px;
  }
  #eye::before {
    content: "";
    background-color: white;
    width: 20px;
    height: 50px;
    transform: translateX(10px);
    display: block;
    position: absolute;
  }
  #eye::after {
    content: "";
    background-color: white;
    width: 40px;
    height: 30px;
    transform: translateY(10px);
    display: block;
    position: absolute;
  }

  #eye1 {
    width: 40px;
    height: 50px;
    position: absolute;
    top: 30px;
    right: 30px;
  }
  #eye1::before {
    content: "";
    background-color: white;
    width: 20px;
    height: 50px;
    transform: translateX(10px);
    display: block;
    position: absolute;
  }
  #eye1::after {
    content: "";
    background-color: white;
    width: 40px;
    height: 30px;
    transform: translateY(10px);
    display: block;
    position: absolute;
  }

  #pupil {
    width: 20px;
    height: 20px;
    background-color: blue;
    position: absolute;
    top: 50px;
    left: 10px;
    z-index: 1;
    animation: eyesMovement infinite 3s;
  }
  #pupil1 {
    width: 20px;
    height: 20px;
    background-color: blue;
    position: absolute;
    top: 50px;
    right: 50px;
    z-index: 1;
    animation: eyesMovement infinite 3s;
  }

  @keyframes eyesMovement {
    0%, 49% { transform: translateX(0px); }
    50%, 99% { transform: translateX(10px); }
    100% { transform: translateX(0px); }
  }

  #shadow {
    background-color: black;
    width: 140px;
    height: 140px;
    position: absolute;
    border-radius: 50%;
    transform: rotateX(80deg);
    filter: blur(20px);
    top: 80%;
    animation: shadowMovement infinite 0.5s;
  }

  @keyframes shadowMovement {
    0%, 49% { opacity: 0.5; }
    50%, 100% { opacity: 0.2; }
  }
  
  /* 响应式调整幽灵大小 */
  @media (max-width: 640px) {
    .ghost-wrapper {
      animation: walkFromLeftToRight 10s linear infinite;
    }
    #ghost {
      scale: 0.55;
    }
    body {
      padding-bottom: 110px;
    }
  }

  /* ==================================================
     新增悬挂小丑(蜘蛛侠风格)装饰 - 完全来自Uiverse By Elijah
     放置在左上角圈圈位置 (根据最新图片要求，微调向右移一点确保完整展示)
     不修改任何原始样式，仅增加作用域避免冲突
     ================================================== */
  .hanging-decoration {
    position: fixed;
    top: 20px;
    left: 80px;       /* 稍向右移，让装饰完整显示在圈圈处且不贴最左边 */
    z-index: 200;
    pointer-events: none;   /* 让装饰不干扰点击 */
  }
  /* 完全保留原始容器及内部样式，限定作用域避免全局样式污染 */
  .hanging-decoration .center {
    position: relative;
    transform: translateX(0);
    left: 0;
  }
  .hanging-decoration .container {
    height: 31.25em;
    width: 21.87em;
    margin-top: 0;
    position: relative;
  }
  .hanging-decoration .rope {
    height: 13.62em;
    width: 0.15em;
    background-color: #ffffff;
    animation: swing 2s infinite;
  }
  @keyframes swing {
    50% {
      transform: translateY(-4em);
    }
  }
  .hanging-decoration .legs {
    height: 1.12em;
    width: 7.5em;
    background-color: transparent;
    box-shadow: 0 0 0 0.12em #140243, 0 0 0 1.06em #1b1676, 0 0 0 1.18em #140243;
    top: 12.5em;
    border-radius: 3.12em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .hanging-decoration .boot-l,
  .hanging-decoration .boot-r {
    height: 1.25em;
    width: 2.5em;
    background-color: #e32832;
    position: absolute;
    border: 0.12em solid #140243;
    bottom: 1.12em;
  }
  .hanging-decoration .boot-l {
    left: 1em;
  }
  .hanging-decoration .boot-r {
    transform: rotateY(180deg);
    left: 3.81em;
  }
  .hanging-decoration .boot-l:before,
  .hanging-decoration .boot-r:before {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    border-bottom: 1.12em solid #140243;
    border-left: 1.18em solid transparent;
    bottom: 1.31em;
    left: 1.46em;
  }
  .hanging-decoration .boot-l:after,
  .hanging-decoration .boot-r:after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    border-bottom: 1.12em solid #e32832;
    border-left: 1em solid transparent;
    right: 0;
    top: -0.93em;
  }
  .hanging-decoration .costume {
    height: 6.25em;
    width: 5.62em;
    background: linear-gradient(
      to right,
      #1b1676 20%,
      #e32832 20%,
      #e32832 80%,
      #1b1676 80%
    );
    border: 0.12em solid #140243;
    top: 14.68em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .hanging-decoration .spider {
    height: 1.87em;
    width: 0.93em;
    background-color: #140243;
    border-radius: 45%;
    position: absolute;
    transform: translate(-50%, -50%);
    top: calc(50% + 0.93em);
    left: 50%;
  }
  .hanging-decoration .s1,
  .hanging-decoration .s3 {
    height: 7.5em;
    width: 2.5em;
    border-radius: 0 0 1.37em 1.37em;
    border-bottom: 0.12em solid #140243;
    position: absolute;
  }
  .hanging-decoration .s2,
  .hanging-decoration .s4 {
    height: 7.5em;
    width: 3.12em;
    border-radius: 0 0 1.56em 1.56em;
    border-bottom: 0.12em solid #140243;
    position: absolute;
  }
  .hanging-decoration .s1,
  .hanging-decoration .s2,
  .hanging-decoration .s3,
  .hanging-decoration .s4 {
    left: 50%;
  }
  .hanging-decoration .s1 {
    bottom: 1.43em;
  }
  .hanging-decoration .s2 {
    bottom: 0.93em;
  }
  .hanging-decoration .s3,
  .hanging-decoration .s4 {
    transform: translateX(-50%) rotateX(180deg);
  }
  .hanging-decoration .s3 {
    top: 1.43em;
  }
  .hanging-decoration .s4 {
    top: 0.93em;
  }
  .hanging-decoration .belt {
    height: 0.43em;
    width: 5.87em;
    background-color: #e32832;
    border: 0.12em solid #140243;
    top: -0.12em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .hanging-decoration .hand-r,
  .hanging-decoration .hand-l {
    height: 8.12em;
    background: linear-gradient(
      #e32832 4.6em,
      #140243 4.6em,
      #140243 4.75em,
      #1b1676 4.75em,
      #1b1676 8.12em
    );
    width: 1.12em;
    border: 0.12em solid #140243;
    border-radius: 1.25em;
    position: absolute;
    transform-origin: bottom;
    bottom: -0.12em;
  }
  .hanging-decoration .hand-r {
    right: -0.75em;
    transform: rotate(-22deg);
  }
  .hanging-decoration .hand-l {
    left: -0.75em;
    transform: rotate(22deg);
  }
  .hanging-decoration .neck {
    height: 0.37em;
    width: 1.25em;
    background-color: #e32832;
    bottom: -0.62em;
    border: 0.12em solid #140243;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .hanging-decoration .mask {
    height: 4.65em;
    width: 4.06em;
    background-color: #e32832;
    border-radius: 50% 50% 50% 50% / 54% 54% 46% 46%;
    border: 0.12em solid #140243;
    top: 6.56em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .hanging-decoration .eye-l,
  .hanging-decoration .eye-r {
    height: 0.68em;
    width: 1.37em;
    background-color: #ffffff;
    border-radius: 1.37em 1.37em 0 0;
    border: 0.12em solid #140243;
    position: absolute;
    top: 2.1em;
  }
  .hanging-decoration .eye-l {
    left: 0.3em;
  }
  .hanging-decoration .eye-r {
    right: 0.3em;
  }
  .hanging-decoration .cover {
    height: 3.12em;
    width: 0.15em;
    background-color: #ffffff;
    bottom: 8.12em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  @media screen and (max-width: 768px) {
    .hanging-decoration {
      transform: scale(0.6);
      transform-origin: top left;
      top: 8px;
      left: 10px;
    }
    .hanging-decoration .container {
      font-size: 16px;
    }
  }
  @media screen and (max-width: 480px) {
    .hanging-decoration {
      transform: scale(0.5);
      top: 0px;
      left: 5px;
    }
  }
</style>
</head>
<body>

<!-- 新增悬挂小丑/蜘蛛侠装饰 - 位于左上角圈圈位置 (来自Uiverse.io by TechByElijah) 完全保留原始视觉 -->
<div class="hanging-decoration">
  <div class="container center">
    <div class="rope center">
      <div class="legs center">
        <div class="boot-l"></div>
        <div class="boot-r"></div>
      </div>
      <div class="costume center">
        <div class="spider">
          <div class="s1 center"></div>
          <div class="s2 center"></div>
          <div class="s3"></div>
          <div class="s4"></div>
        </div>
        <div class="belt center"></div>
        <div class="hand-r"></div>
        <div class="hand-l"></div>
        <div class="neck center"></div>
        <div class="mask center">
          <div class="eye-l"></div>
          <div class="eye-r"></div>
        </div>
        <div class="cover center"></div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <!-- PROFILE: Logo 在标题正上方居中 -->
  <div class="profile">
    <!-- 保留原始logo占位，实际为assets/logo.png，如需显示请替换真实图片。这里保留结构完全符合原图要求 -->
    <img src="assets/logo.png" alt="Clocked In 2026">
    <h1 class="btn-shine">CLOCKED IN 2026</h1>
